<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Styled Webpage</title>
    
    <style>
        body {
            background-color: #f0f4f8; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            line-height: 1.6;
            margin: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 10px;
            text-align: center;
        }

        /* This styles your image and handles the 'broken' look if the path is wrong */
        .profile-img {
            width: 100%;
            max-width: 600px;
            height: auto;
            border-radius: 15px;
            margin: 20px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            background-color: #ddd; /* Shows a grey box if image is missing */
            min-height: 200px; 
        }

        .content-box {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 800px;
        }
    </style>
</head>
<body>

    <h1>Welcome to Web Development 101</h1>
    
    <h2>Update: Troubleshooting my image!</h2>

    <img src="IMG_0734.png" alt="My uploaded photo" class="profile-img">

    <div class="content-box">
        <p>This is my very first official webpage! I'm currently troubleshooting my image display. If the image above is a grey box, it means the filename in my code doesn't perfectly match the file I uploaded to GitHub.</p>
    </div>

</body>
</html>
